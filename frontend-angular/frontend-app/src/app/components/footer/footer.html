<!-- Footer component -->
<footer class="border-t border-blue-200 bg-white">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-10">

    <!-- Top: brand + cols -->
    <div class="grid gap-10 md:grid-cols-4">
      <!-- Brand -->
      <div class="md:col-span-1">
        <a routerLink="/home" class="inline-flex items-center gap-3">
          <img src="/logo-viko.png" alt="Viko Logo" class="h-8 w-8 object-contain" />
          <span class="font-bold text-lg text-blue-800">Viko</span>
        </a>
        <p class="mt-3 text-sm text-blue-700/70">
          Online learning made simple. Courses, topics and a clean learning experience.
        </p>
      </div>

      <!-- Courses -->
      <div>
        <h3 class="text-sm font-semibold text-blue-900">Courses</h3>
        <ul class="mt-3 space-y-2 text-sm">
          <li><a routerLink="/courses" class="text-blue-700 hover:underline">All courses</a></li>
          <li><a routerLink="/topics" class="text-blue-700 hover:underline">Topics</a></li>
        </ul>
      </div>


      


      <!-- Account -->
      <div>
        <h3 class="text-sm font-semibold text-blue-900">Account</h3>
        <ul class="mt-3 space-y-2 text-sm">
          <li><a routerLink="/profile" class="text-blue-700 hover:underline">Profile</a></li>
        </ul>
      </div>
    </div>

    <!-- Break line -->
    <div class="my-8 border-t border-blue-200"></div>

    <!-- Bottom: legal + links -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <p class="text-xs text-blue-700/70">
        © {{ currentYear }} Viko. All rights reserved.
      </p>
    </div>
  </div>
</footer>
