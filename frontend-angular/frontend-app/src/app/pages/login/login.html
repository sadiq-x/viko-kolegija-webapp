<!-- Página de Login -->
<div class="min-h-screen bg-blue-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo / Título -->
        <div class="text-center mb-6">
            <img src="/logo-viko.png" alt="Logo Viko" class="mx-auto w-24 h-24 object-contain" />
            <h1 class="mt-3 text-2xl font-bold text-blue-800">Sign in</h1>
            <p class="mt-1 text-sm text-blue-700/70">Fill in the data securely.</p>
        </div>

        <!-- Cartão -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium text-blue-900">Username</label>
                    <input id="username" type="text" formControlName="username" autocomplete="username"
                        placeholder="Username" class="mt-1 w-full rounded-xl border border-blue-200 bg-white px-3 py-2 text-blue-900
                   placeholder:text-blue-900/40 focus:outline-none focus:ring-4
                   focus:ring-blue-200 focus:border-blue-400" aria-describedby="username-help" required />
                    <p id="username-help" class="mt-1 text-xs text-blue-700/70">
                        Use the username associated with your account.
                    </p>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-sm font-medium text-blue-900">Password</label>
                        <a href="#" class="text-xs font-medium text-blue-700 hover:underline">Did you forget?</a>
                    </div>

                    <div class="mt-1 relative">
                        <input id="password" formControlName="password" autocomplete="new-password" required class="w-full rounded-xl border border-blue-200 bg-white px-3 py-2 pr-10 text-blue-900
                    placeholder:text-blue-900/40 focus:outline-none focus:ring-4
                    focus:ring-blue-200 focus:border-blue-400" placeholder="••••••••" type="password"
                            aria-describedby="password-help" />
                        <button type="button" aria-label="Mostrar palavra-passe"
                            class="absolute inset-y-0 right-2 my-auto inline-flex items-center justify-center rounded-lg p-2 text-blue-700/70 hover:bg-blue-50"
                            onclick="const c=document.getElementById('password'); c.type = c.type==='password' ? 'text':'password';">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24"
                                fill="currentColor">
                                <path
                                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7Zm0 12a5 5 0 1 1 5-5 5.006 5.006 0 0 1-5 5Z" />
                            </svg>
                        </button>
                    </div>
                    <p id="password-help" class="mt-1 text-xs text-blue-700/70">
                        Keep your password safe.
                    </p>
                </div>

                <!-- Opções -->
                <div class="flex items-center justify-between">
                    <label class="inline-flex items-center gap-2 text-sm text-blue-900">
                        <input type="checkbox" formControlName="remember"
                            class="h-4 w-4 rounded-md border-blue-300 text-blue-600 focus:ring-blue-300" />
                        Remember me
                    </label>
                    <a href="#" class="text-sm font-medium text-blue-700 hover:underline">Do you need help?</a>
                </div>

                <!-- Botão Entrar (desativa enquanto formulário inválido) -->
                <button type="submit" [disabled]="form.invalid" class="w-full rounded-xl bg-blue-600/90 px-4 py-2.5 font-semibold text-white shadow-lg
                 hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-blue-200
                 active:translate-y-[1px] transition
                 disabled:opacity-50 disabled:cursor-not-allowed">
                    Sign in
                </button>

                <!-- Divisor -->
                <div class="relative my-2">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-blue-200"></div>
                    </div>
                    <div class="relative flex justify-center">
                        <span class="bg-white px-3 text-xs text-blue-700/70">or</span>
                    </div>
                </div>

                <!-- Ação secundária -->
                <p class="text-center text-sm text-blue-900">
                    Don't have an account?
                    <a routerLink="/register" class="font-semibold text-blue-700 hover:underline">Create account</a>
                </p>
            </form>
        </div>
    </div>
</div>
