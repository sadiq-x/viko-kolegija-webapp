<div class="min-h-screen bg-gray-50 py-10 px-4 flex justify-center">
  <div class="w-full max-w-4xl">

    <!-- Header -->
    <div class="mb-6 flex items-center justify-between">
      <a routerLink="/topics"
        class="inline-flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-3 py-2 text-blue-700 hover:bg-blue-50 transition">
        ← Back
      </a>

      <h1 class="text-xl font-bold text-gray-900">
        Courses of type: <span class="text-blue-800">{{ type }}</span>
      </h1>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="space-y-3">
      <div class="h-6 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-6 bg-gray-200 rounded animate-pulse"></div>
      <div class="h-6 bg-gray-200 rounded animate-pulse"></div>
    </div>

    <!-- Vertical list of events -->
    <div *ngIf="!loading && courses().length > 0"
      class="flex flex-col divide-y divide-gray-200 rounded-xl border border-gray-200 bg-white shadow-sm">

      <article *ngFor="let c of courses()" [routerLink]="['/courses/individual', c.Id]" [state]="{ event: c }"
        [class.pointer-events-none]="!c.Status" class="group p-5 transition hover:bg-blue-50 cursor-pointer">

        <!-- Header event -->
        <div class="flex items-start justify-between mb-2">
          <h3 class="text-lg font-semibold text-gray-900" [class.group-hover:text-blue-600]="c.Status">
            {{ c.Name }}
          </h3>

          <span class="text-xs font-semibold rounded-full px-3 py-1 border" [ngClass]="{
                      'bg-green-100 text-green-700 border-green-200': c.Status === 'Open',
                      'bg-yellow-100 text-yellow-700 border-yellow-200': c.Status === 'Ongoing',
                      'bg-red-100 text-red-700 border-red-200': c.Status === 'Close'}">
            {{ c.Status }}
          </span>
        </div>

        <!-- Description -->
        <p class="text-sm text-gray-700 mb-3">
          {{ c.Description }}
        </p>

        <!-- Extra info -->
        <div class="text-xs text-gray-600 space-y-1">
          <div><strong>Created:</strong> {{ c.DateCreate | date:'medium' }}</div>
          <div *ngIf="c.TopicName"><strong>Topic:</strong> {{ c.TopicName }}</div>
        </div>
      </article>
    </div>

    <!-- Not found events -->
    <div *ngIf="!loading && courses().length === 0"
      class="mt-6 rounded-xl border border-gray-200 bg-white p-6 text-center text-gray-600">
      No courses found for this type.
    </div>

  </div>
</div>
