<!-- Page Courses List-->
<div class="min-h-screen bg-gray-100 py-8 px-4 flex justify-center">
  <div class="w-full max-w-6xl">

    <!-- Tittle -->
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold text-blue-800">All courses</h1>
        <p class="text-sm text-gray-900">
          Search and filter by name, description, type and creation date.
        </p>
      </div>
    </div>

    <!-- Filters -->
    <div
      class="mb-4 grid grid-cols-1 md:grid-cols-4 gap-4 bg-white rounded-2xl border border-gray-200 p-4 shadow-sm items-end">

      <!-- Filter text (name + description) -->
      <div class="md:col-span-2">
        <label class="block text-xs font-semibold text-gray-700 mb-1">Search</label>
        <input type="text" [ngModel]="query()" (ngModelChange)="query.set($event)"
          placeholder="Search by name or description..." class="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm
                 text-gray-900 placeholder:text-gray-400
                 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400" />
      </div>

      <!-- Filter type -->
      <div>
        <label class="block text-xs font-semibold text-gray-700 mb-1">Type</label>
        <select [ngModel]="typeFilter()" (ngModelChange)="typeFilter.set($event)" class="w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm
                 text-gray-900 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400">
          <option value="">All types</option>
          <option *ngFor="let t of courseTypes()" [value]="t">
            {{ t }}
          </option>
        </select>
      </div>

      <!-- Filter dates side by side -->
      <div>
        <label class="block text-xs font-semibold text-gray-700 mb-1">Date range</label>
        <div class="flex gap-2">
          <input type="date" [ngModel]="dateFrom()" (ngModelChange)="dateFrom.set($event)" class="w-1/2 rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm
                   text-gray-900 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400" />

          <input type="date" [ngModel]="dateTo()" (ngModelChange)="dateTo.set($event)" class="w-1/2 rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm
                   text-gray-900 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400" />
        </div>
      </div>
    </div>

    <!-- Button reset filters -->
    <div class="flex justify-end mb-6">
      <button type="button" (click)="resetFilters()" class="rounded-xl bg-blue-600 text-white text-sm font-semibold px-5 py-2.5 shadow
               hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-200 transition">
        Reset Filters
      </button>
    </div>

    <!-- Loading view -->
    <div *ngIf="loading()" class="space-y-3">
      <div class="h-20 bg-gray-200 rounded-xl animate-pulse"></div>
      <div class="h-20 bg-gray-200 rounded-xl animate-pulse"></div>
      <div class="h-20 bg-gray-200 rounded-xl animate-pulse"></div>
    </div>

    <!-- List of courses -->
    <div *ngIf="!loading() && filteredCourses().length > 0" class="flex flex-col rounded-2xl">
      <article *ngFor="let c of filteredCourses(); trackBy: trackById" [routerLink]="['/courses/individual', c.Id]"
        [state]="{ event: c }"
        class="group p-5 cursor-pointer divide-gray-200 rounded-2xl hover:border hover:border-gray-200 bg-white hover:bg-blue-50 hover:shadow-md mb-1">
        <div class="flex items-start justify-between mb-2">
          <h2 class="text-lg font-semibold text-gray-900 group-hover:text-blue-600">
            {{ c.Name }}
          </h2>

          <span class="text-xs font-semibold rounded-full px-3 py-1 border" [ngClass]="{
                      'bg-green-100 text-green-700 border-green-200': c.Status === 'Open',
                      'bg-yellow-100 text-yellow-700 border-yellow-200': c.Status === 'Ongoing',
                      'bg-red-100 text-red-700 border-red-200': c.Status === 'Close'}">
            {{ c.Status }}
          </span>
        </div>

        <p class="text-sm text-gray-700 mb-3">
          {{ c.Description }}
        </p>

        <div class="text-xs text-gray-600 flex flex-wrap gap-4">
          <span><strong>Created:</strong> {{ c.DateCreate | date:'mediumDate' }}</span>
          <span *ngIf="c.TopicName"><strong>Type:</strong> {{ c.TopicName }}</span>
        </div>
      </article>
    </div>

    <!-- No courses found -->
    <div *ngIf="!loading() && filteredCourses().length === 0"
      class="mt-6 rounded-2xl border border-gray-200 bg-white p-6 text-center text-gray-600">
      No courses found.
    </div>
  </div>
</div>
