<!-- Página Detalhe do Evento -->
<div class="min-h-screen bg-blue-50 py-10 px-4 flex items-start justify-center">
  <div class="w-full max-w-3xl">

    <!-- Barra superior -->
    <div class="mb-6 flex items-center justify-between">
      <a routerLink="/teacher"
         class="inline-flex items-center gap-2 rounded-xl border border-blue-200 bg-white px-3 py-2 text-blue-700 hover:bg-blue-50 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M15.5 5.5 9 12l6.5 6.5-1.5 1.5L6 12l8-8 1.5 1.5Z"/>
        </svg>
        Back to list
      </a>

      <div class="flex items-center gap-2 text-blue-700/70 text-sm">
        <span class="hidden sm:inline">Teacher Center</span>
        <span>•</span>
        <span>Event details</span>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div *ngIf="loading" class="bg-white rounded-2xl shadow-lg border border-blue-200 p-6 animate-pulse">
      <div class="h-6 w-1/2 bg-blue-100 rounded mb-4"></div>
      <div class="h-4 w-3/4 bg-blue-100 rounded mb-2"></div>
      <div class="h-4 w-2/3 bg-blue-100 rounded mb-6"></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="h-16 bg-blue-100 rounded"></div>
        <div class="h-16 bg-blue-100 rounded"></div>
      </div>
    </div>

    <!-- Conteúdo -->
    <div *ngIf="!loading && course; else notFound"
         class="bg-white rounded-2xl shadow-lg border border-blue-200 p-6">

      <!-- Header -->
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold text-blue-900">{{ course.Name }}</h1>
          <p class="mt-1 text-sm text-blue-700/70">
            {{ course.Description }}
          </p>
        </div>

        <!-- Badge de estado -->
        <span
          class="shrink-0 rounded-full px-3 py-1 text-xs font-semibold"
          [ngClass]="course.Status
                      ? 'bg-green-100 text-green-700 border border-green-200'
                      : 'bg-red-100 text-red-700 border border-red-200'">
          {{ course.Status ? 'Active' : 'Inactive' }}
        </span>
      </div>

      <!-- Meta info -->
      <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="rounded-xl border border-blue-200 bg-blue-50/50 p-4">
          <p class="text-xs uppercase tracking-wide text-blue-700/70">Created</p>
          <p class="mt-1 font-medium text-blue-900">
            {{ course.DateCreate | date:'medium' }}
          </p>
        </div>

        <div class="rounded-xl border border-blue-200 bg-blue-50/50 p-4" *ngIf="course.TopicName">
          <p class="text-xs uppercase tracking-wide text-blue-700/70">Topic</p>
          <p class="mt-1">
            <span class="inline-flex items-center rounded-full bg-blue-100 text-blue-800 border border-blue-200 px-3 py-1 text-xs font-semibold">
              {{ course.TopicName }}
            </span>
          </p>
        </div>
      </div>

      <!-- Resultados -->
      <div class="mt-6">
        <h2 class="text-sm font-semibold text-blue-800">Result</h2>
        <div class="mt-2 rounded-xl border border-blue-200 bg-blue-50/40 p-4">
          <p class="text-blue-900" *ngIf="course.Results; else noResult">
            {{ course.Results }}
          </p>
          <ng-template #noResult>
            <p class="text-blue-700/70 italic">No results available yet.</p>
          </ng-template>
        </div>
      </div>

      <!-- Ações -->
      <div class="mt-6 flex flex-wrap gap-3">
        <button type="button"
                class="rounded-xl bg-blue-600/90 px-4 py-2.5 font-semibold text-white shadow hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-blue-200">
          Edit event
        </button>
        <button type="button"
                class="rounded-xl bg-white px-4 py-2.5 font-semibold text-blue-700 border border-blue-200 shadow-sm hover:bg-blue-50 focus:outline-none focus:ring-4 focus:ring-blue-200">
          Export
        </button>
      </div>
    </div>

    <!-- Not found -->
    <ng-template #notFound>
      <div class="rounded-2xl border border-red-200 bg-red-50 p-6 text-red-700">
        Event not found.
      </div>
    </ng-template>
  </div>
</div>
