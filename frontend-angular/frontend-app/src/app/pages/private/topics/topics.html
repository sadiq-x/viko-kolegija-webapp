<!-- Page Topics -->
<div class="bg-gray-100 py-8 px-4 flex justify-center">
  <section class="w-full max-w-6xl">

    <!-- Tittle -->
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold text-blue-800">Topics</h1>
        <p class="text-sm text-gray-900">
          Search and filter by name and description.
        </p>
      </div>
    </div>

    <!-- Search -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-6">
      <div class="relative w-full sm:w-80 ">
        <input type="text" [ngModel]="query()" (ngModelChange)="query.set($event)"
          class="w-full rounded-xl border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
          placeholder="Search by type or description..." aria-label="Search by type or description..." />
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div *ngFor="let _ of loadingSkeletons;" class="animate-pulse rounded-xl border border-gray-200 p-4 bg-white">
        <div class="h-5 w-1/2 bg-gray-200 rounded mb-3"></div>
        <div class="h-4 w-full bg-gray-200 rounded mb-2"></div>
        <div class="h-4 w-5/6 bg-gray-200 rounded"></div>
      </div>
    </div>

    <!-- Content -->
    <ng-container *ngIf="!loading">
      <!-- Without results -->
      <div *ngIf="filtered().length === 0"
        class="rounded-xl border border-gray-300 p-6 text-center text-gray-600">
        <p class="font-medium text-slate-700">No topics found.</p>
        <p class="text-sm">Adjust the search or check for data.</p>
      </div>

      <!-- List with topics -->
      <div *ngIf="filtered().length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <article *ngFor="let t of filtered(); trackBy: trackById" [routerLink]="['/courses/type', t.Type]"
          [state]="{ course: t }"
          class="group cursor-pointer rounded-xl border border-gray-200 p-4 bg-white hover:shadow-md transition hover:border-blue-500"
          tabindex="0" role="button" aria-label="Open topic {{ t.Type }}">
          <header class="mb-2 flex items-center justify-between">
            <h3 class="text-lg text-gray-900 font-semibold text-slate-800 group-hover:text-blue-600 ">{{ t.Type }}</h3>
          </header>
          <p class="text-gray-700 text-sm leading-relaxed line-clamp-3">
            {{ t.Description }}
          </p>
        </article>
      </div>
    </ng-container>
  </section>
</div>
